<!DOCTYPE html>
<html lang="en">

<head>
    <title>
    {% block title %} My Feedback Site{% endblock %}
    </title>

    <style>
    body {
        font-family: Arial, Arial, Helvetica, sans-serif;
        margin: 20px;
        background: white;
    }
    header , footer {
        background-color: #090909;
        padding: 10px;
        color: white;
    }
    nav a {
        margin: 0 10px;
        text-decoration: none;
        color: white;
    }
    main {
        background: #f4f4f4;
        padding: 20px;
        margin-top: 20px;
        border-radius: 5px;
    }
    </style>
    
</head>

<body>
    <header>
        <h1>My Feedback Page</h1>

        <nav>
            <a href="/">Home</a>
            <!-- <a href="/feedback">Feedback</a> -->
            <a href="/about">About</a>
        </nav>

    </header>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    <p>&copy; 2026 My Feedback Site</p>
</footer>

</body>
</html>
