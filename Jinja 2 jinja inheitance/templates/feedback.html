{% extends "base.html" %}
{% block title %} Feedback Form {% endblock %}

{% block content %}
    <h2>Send Us a Feedback Message</h2>
    <form method="POST" action="/feedback">
        <label for="username">Name:</label>
        <input type="text" name="username" id="username" placeholder="Enter your username"><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="5" cols="40" placeholder="Enter your message here"></textarea><br><br>

        <input type="submit" value="Submit Feedback">
    </form>
    
{% endblock %}
